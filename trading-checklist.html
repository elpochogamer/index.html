<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Checklist v2 — NAS/SP500</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;0,700;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --s1: #0e0e1a;
  --s2: #141424;
  --border: #1f1f35;
  --border2: #2a2a45;
  --g: #00e5a0;
  --g2: rgba(0,229,160,0.12);
  --r: #ff3d5a;
  --r2: rgba(255,61,90,0.12);
  --y: #ffc94d;
  --y2: rgba(255,201,77,0.12);
  --b: #4d8eff;
  --b2: rgba(77,142,255,0.12);
  --p: #b366ff;
  --text: #d8d8f0;
  --muted: #52527a;
  --muted2: #3a3a58;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 60% 40% at 10% 0%, rgba(0,229,160,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 100%, rgba(77,142,255,0.05) 0%, transparent 60%);
}

/* TABS NAV */
.nav {
  display: flex;
  align-items: center;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(8,8,16,0.95);
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
  gap: 0;
}

.nav-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 3px;
  color: var(--g);
  margin-right: 28px;
  padding: 16px 0;
  white-space: nowrap;
}

.nav-tab {
  padding: 16px 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  background: none;
  border-top: none; border-left: none; border-right: none;
  white-space: nowrap;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--g); border-bottom-color: var(--g); }

/* PANELS */
.panel { display: none; padding: 24px; max-width: 960px; margin: 0 auto; }
.panel.active { display: block; }

/* SESSION BAR */
.session-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.sess-btn {
  padding: 7px 16px;
  border: 1px solid var(--border2);
  background: var(--s1);
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
}
.sess-btn:hover { border-color: var(--g); color: var(--g); }
.sess-btn.active { background: var(--g2); border-color: var(--g); color: var(--g); }

/* PROGRESS */
.progress-wrap {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 18px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.progress-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; white-space: nowrap; }
.bar-track { flex: 1; height: 4px; background: var(--border2); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease, background 0.3s; background: var(--g); box-shadow: 0 0 8px rgba(0,229,160,0.5); }
.bar-fill.warn { background: var(--y); box-shadow: 0 0 8px rgba(255,201,77,0.5); }
.bar-fill.danger { background: var(--r); box-shadow: 0 0 8px rgba(255,61,90,0.5); }
.progress-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--g); min-width: 44px; text-align: right; line-height: 1; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
@media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }
.full { grid-column: 1/-1; }

/* CARDS */
.card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 18px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.card.c-bias::before { background: linear-gradient(90deg, var(--g), transparent); }
.card.c-sweep::before { background: linear-gradient(90deg, var(--y), transparent); }
.card.c-entry::before { background: linear-gradient(90deg, var(--b), transparent); }
.card.c-m1::before { background: linear-gradient(90deg, var(--p), transparent); }
.card.c-risk::before { background: linear-gradient(90deg, var(--r), transparent); }
.card.c-session::before { background: linear-gradient(90deg, #4dd9ff, transparent); }

.card-hdr {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
.card-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.c-bias .card-dot { background: var(--g); }
.c-sweep .card-dot { background: var(--y); }
.c-entry .card-dot { background: var(--b); }
.c-m1 .card-dot { background: var(--p); }
.c-risk .card-dot { background: var(--r); }
.c-session .card-dot { background: #4dd9ff; }

.card-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  flex: 1;
}
.card-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted2);
}

/* CHECK ITEMS */
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 6px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.12s;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.check-item:last-of-type { border-bottom: none; }
.check-item:hover { background: rgba(255,255,255,0.02); }
.check-item.checked { opacity: 0.55; }
.check-item.checked .ci-text { text-decoration: line-through; color: var(--muted); }

.ci-box {
  width: 16px; height: 16px;
  border: 1.5px solid var(--border2);
  border-radius: 3px;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  color: #000;
  transition: all 0.15s;
}
.check-item.checked .ci-box { background: var(--g); border-color: var(--g); box-shadow: 0 0 6px rgba(0,229,160,0.4); }

.ci-text {
  font-size: 12px;
  line-height: 1.55;
  color: var(--text);
  transition: all 0.15s;
}
.ci-text b { color: var(--g); font-weight: 600; }
.ci-text .yt { color: var(--y); font-weight: 600; }
.ci-text .bt { color: var(--b); font-weight: 600; }
.ci-text .pt { color: var(--p); font-weight: 600; }
.ci-text .rt { color: var(--r); font-weight: 600; }

.mand-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  color: var(--r);
  letter-spacing: 1px;
  margin-top: 2px;
}

/* VERDICT */
.verdict {
  margin-top: 16px;
  border-radius: 6px;
  padding: 16px 20px;
  text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 4px;
  display: none;
  animation: fadeUp 0.3s ease;
}
.verdict.show { display: block; }
.verdict.go { background: var(--g2); border: 1px solid var(--g); color: var(--g); }
.verdict.almost { background: var(--y2); border: 1px solid var(--y); color: var(--y); }
.verdict.no { background: var(--r2); border: 1px solid var(--r); color: var(--r); }

/* NOTES */
.notes-section {
  margin-top: 16px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
}
.notes-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.notes-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}
@media (max-width: 600px) { .notes-grid { grid-template-columns: 1fr; } }

.note-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.note-field label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.note-input {
  background: var(--s2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 7px 10px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  outline: none;
  transition: border-color 0.15s;
}
.note-input:focus { border-color: var(--g); }
.note-input::placeholder { color: var(--muted2); }

.note-textarea {
  background: var(--s2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 8px 10px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  outline: none;
  resize: vertical;
  min-height: 60px;
  width: 100%;
  transition: border-color 0.15s;
  margin-top: 8px;
}
.note-textarea:focus { border-color: var(--g); }
.note-textarea::placeholder { color: var(--muted2); }

/* BUTTONS */
.btn-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.btn {
  padding: 9px 20px;
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid var(--border2);
  background: none;
  color: var(--muted);
}
.btn:hover { border-color: var(--text); color: var(--text); }
.btn.primary { background: var(--g); border-color: var(--g); color: #000; font-weight: 700; }
.btn.primary:hover { opacity: 0.85; }
.btn.danger:hover { border-color: var(--r); color: var(--r); }

/* ── HISTORY PANEL ── */
.history-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 13px;
}

.hist-item {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px 18px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color 0.15s;
  animation: fadeUp 0.25s ease;
}
.hist-item:hover { border-color: var(--border2); }

.hist-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.hist-verdict {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  padding: 3px 10px;
  border-radius: 3px;
}
.hist-verdict.go { background: var(--g2); color: var(--g); border: 1px solid rgba(0,229,160,0.3); }
.hist-verdict.almost { background: var(--y2); color: var(--y); border: 1px solid rgba(255,201,77,0.3); }
.hist-verdict.no { background: var(--r2); color: var(--r); border: 1px solid rgba(255,61,90,0.3); }

.hist-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  flex: 1;
}
.hist-score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

.hist-fields {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}
.hist-field {
  font-size: 11px;
  color: var(--muted);
}
.hist-field span { color: var(--text); font-weight: 500; }

.hist-notes {
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
  border-top: 1px solid var(--border);
  padding-top: 8px;
  margin-top: 6px;
  line-height: 1.5;
}

.hist-detail { display: none; margin-top: 10px; }
.hist-item.expanded .hist-detail { display: block; }

.hist-checks {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.hist-check-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 2px;
  letter-spacing: 1px;
}
.hct-done { background: rgba(0,229,160,0.08); color: var(--g); }
.hct-miss { background: rgba(255,61,90,0.08); color: var(--r); }

/* STATS */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
@media (max-width: 600px) { .stats-row { grid-template-columns: 1fr 1fr; } }

.stat-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  text-align: center;
}
.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}
.stat-g { color: var(--g); }
.stat-y { color: var(--y); }
.stat-r { color: var(--r); }
.stat-b { color: var(--b); }

.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  margin-top: 4px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.del-hist {
  background: none;
  border: none;
  color: var(--muted2);
  cursor: pointer;
  font-size: 16px;
  padding: 0 4px;
  transition: color 0.15s;
  line-height: 1;
  margin-left: auto;
}
.del-hist:hover { color: var(--r); }

select.note-input { cursor: pointer; }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-logo">TRADE·CK</div>
  <button class="nav-tab active" onclick="switchTab('checklist')">Checklist</button>
  <button class="nav-tab" onclick="switchTab('history')">Historial</button>
</div>

<!-- ══════════ CHECKLIST PANEL ══════════ -->
<div class="panel active" id="panel-checklist">

  <div class="session-bar">
    <button class="sess-btn active" onclick="setSession('ny',this)">🗽 NY Open</button>
    <button class="sess-btn" onclick="setSession('preny',this)">⚡ Pre-NY</button>
    <button class="sess-btn" onclick="setSession('asia',this)">🌏 Asia</button>
  </div>

  <div class="progress-wrap">
    <span class="progress-label">Completado</span>
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    <span class="progress-num" id="progressNum">0/0</span>
  </div>

  <div class="grid" id="checkGrid"></div>

  <div class="verdict" id="verdict"></div>

  <!-- NOTAS DEL TRADE -->
  <div class="notes-section">
    <div class="notes-label">📝 Notas del trade</div>
    <div class="notes-grid">
      <div class="note-field">
        <label>Par / Instrumento</label>
        <input class="note-input" id="n-pair" placeholder="NAS100">
      </div>
      <div class="note-field">
        <label>Dirección</label>
        <select class="note-input" id="n-dir">
          <option value="">--</option>
          <option>LONG</option>
          <option>SHORT</option>
        </select>
      </div>
      <div class="note-field">
        <label>Resultado</label>
        <select class="note-input" id="n-result">
          <option value="">-- (aún no)</option>
          <option>WIN</option>
          <option>LOSS</option>
          <option>BE (break even)</option>
          <option>No ejecutado</option>
        </select>
      </div>
      <div class="note-field">
        <label>Zona de entrada</label>
        <input class="note-input" id="n-entry" placeholder="19,450 / 0.618 fib">
      </div>
      <div class="note-field">
        <label>SL</label>
        <input class="note-input" id="n-sl" placeholder="19,380">
      </div>
      <div class="note-field">
        <label>TP</label>
        <input class="note-input" id="n-tp" placeholder="19,600">
      </div>
    </div>
    <textarea class="note-textarea" id="n-notes" placeholder="Contexto del trade: qué viste, qué dudaste, qué salió diferente..."></textarea>
    <div class="btn-row">
      <button class="btn primary" onclick="saveTrade()">Guardar en historial</button>
      <button class="btn danger" onclick="resetAll()">↺ Reset</button>
    </div>
  </div>
</div>

<!-- ══════════ HISTORY PANEL ══════════ -->
<div class="panel" id="panel-history">
  <div class="stats-row" id="statsRow"></div>
  <div class="section-label">trades registrados</div>
  <div id="histList"></div>
</div>

<script>
// ════════════ DATA ════════════
const SECTIONS = {
  bias: {
    title: 'Bias & Dirección', cls: 'c-bias',
    items: [
      { id:'b1', text:'<b>H4 bias definido</b> — HH/HL = bullish · LH/LL = bearish', m:true },

  ny: [
    { id:'ss1', text:'Esperar los <b>primeros 15 min</b> del NY Open (9:30–9:45am) antes de entrar', m:true },
    { id:'ss2', text:'NY Open marcó <b>nuevo high o low</b> vs Asia/Londres — dirección definida', m:false },
    { id:'ss3', text:'No entrar después de <b>11:30am ET</b> — mercado pierde dirección', m:false },
  ],
  preny: [
    { id:'ss1', text:'Zona 8:00–9:30am — <span class="rt">alta manipulación</span>, ser muy selectivo', m:true },
    { id:'ss2', text:'Setup visible en <b>H1 mínimo</b> — ignorar M5/M15 aislados en pre-NY', m:true },
    { id:'ss3', text:'Si el setup no es perfecto: <b>esperar NY Open</b>', m:false },
  ],
  asia: [
    { id:'ss1', text:'Asia = <b>rangos estrechos</b> — reducir expectativa de TP, no buscar impulsos largos', m:true },
    { id:'ss2', text:'Mejor setup: <b>sweep del high/low asiático</b> en primeras 2 horas', m:false },
    { id:'ss3', text:'Riesgo reducido: máximo <b>0.5%</b> en sesión Asia', m:true },
  ],
};

// ════════════ STATE ════════════
let session = 'ny';
let checked = {};
let history = [];

function loadState() {
  try {
    const h = localStorage.getItem('tradeHistory_v2');
    if (h) history = JSON.parse(h);
  } catch(e){}
}

function saveHistory() {
  try { localStorage.setItem('tradeHistory_v2', JSON.stringify(history)); } catch(e){}
}

// ════════════ RENDER CHECKLIST ════════════
function renderChecklist() {
  const grid = document.getElementById('checkGrid');
  grid.innerHTML = '';
  checked = {};

  const order = ['bias','sweep','entry','m1','risk'];
  order.forEach(key => {
    const sec = SECTIONS[key];
    const card = makeCard(sec.title, sec.cls, sec.items);
    if (key === 'm1' || key === 'risk') card.classList.add('full');
    grid.appendChild(card);
  });

  // Session card
  const sessCard = makeCard(`Sesión: ${session.toUpperCase()}`, 'c-session', SESSION_ITEMS[session]);
  sessCard.classList.add('full');
  grid.appendChild(sessCard);

  updateProgress();
}

function makeCard(title, cls, items) {
  const card = document.createElement('div');
  card.className = `card ${cls}`;

  const hdr = document.createElement('div');
  hdr.className = 'card-hdr';
  hdr.innerHTML = `<div class="card-dot"></div><div class="card-title">${title}</div><div class="card-count" id="cnt-${cls}">${items.length}/${items.length}</div>`;
  card.appendChild(hdr);

  items.forEach(item => {
    checked[item.id] = false;
    const row = document.createElement('div');
    row.className = 'check-item';
    row.innerHTML = `
      <div class="ci-box" id="box-${item.id}"></div>
      <div>
        <div class="ci-text">${item.text}</div>
        ${item.m ? '<div class="mand-tag">⚠ obligatorio</div>' : ''}
      </div>`;
    row.onclick = () => toggleItem(item.id);
    card.appendChild(row);
  });

  return card;
}

function toggleItem(id) {
  checked[id] = !checked[id];
  const row = document.querySelector(`#box-${id}`).parentElement.parentElement;
  const box = document.getElementById(`box-${id}`);
  if (checked[id]) { row.classList.add('checked'); box.textContent = '✓'; }
  else { row.classList.remove('checked'); box.textContent = ''; }
  updateProgress();
}

function getAllItems() {
  const all = [];
  ['bias','sweep','entry','m1','risk'].forEach(k => SECTIONS[k].items.forEach(i => all.push(i)));
  SESSION_ITEMS[session].forEach(i => all.push(i));
  return all;
}

function updateProgress() {
  const all = getAllItems();
  const mandatory = all.filter(i => i.m);
  const done = all.filter(i => checked[i.id]).length;
  const mandDone = mandatory.filter(i => checked[i.id]).length;
  const pct = all.length > 0 ? (done / all.length) * 100 : 0;

  document.getElementById('progressNum').textContent = `${done}/${all.length}`;
  const fill = document.getElementById('barFill');
  fill.style.width = pct + '%';

  const allMand = mandDone === mandatory.length;
  const verdict = document.getElementById('verdict');

  if (allMand && done === all.length) {
    fill.className = 'bar-fill';
    verdict.className = 'verdict go show';
    verdict.textContent = '✅ Setup válido — Puedes entrar';
  } else if (allMand && done >= all.length * 0.75) {
    fill.className = 'bar-fill warn';
    verdict.className = 'verdict almost show';
    verdict.textContent = '⚡ Casi listo — Obligatorios OK, revisa opcionales';
  } else if (!allMand && done > 0) {
    fill.className = 'bar-fill danger';
    verdict.className = 'verdict no show';
    verdict.textContent = '🚫 No entrar — Faltan condiciones obligatorias';
  } else {
    fill.className = 'bar-fill';
    verdict.className = 'verdict';
  }
}

// ════════════ SESSION ════════════
function setSession(s, btn) {
  session = s;
  document.querySelectorAll('.sess-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChecklist();
}

// ════════════ SAVE TRADE ════════════
function getVerdict() {
  const all = getAllItems();
  const mandatory = all.filter(i => i.m);
  const done = all.filter(i => checked[i.id]).length;
  const mandDone = mandatory.filter(i => checked[i.id]).length;
  const allMand = mandDone === mandatory.length;
  if (allMand && done === all.length) return 'go';
  if (allMand && done >= all.length * 0.75) return 'almost';
  return 'no';
}

function saveTrade() {
  const all = getAllItems();
  const done = all.filter(i => checked[i.id]).length;

  const trade = {
    id: Date.now(),
    ts: new Date().toLocaleString('es-CO', { dateStyle:'short', timeStyle:'short' }),
    session,
    verdict: getVerdict(),
    score: `${done}/${all.length}`,
    pair: document.getElementById('n-pair').value || 'NAS100',
    dir: document.getElementById('n-dir').value,
    result: document.getElementById('n-result').value,
    entry: document.getElementById('n-entry').value,
    sl: document.getElementById('n-sl').value,
    tp: document.getElementById('n-tp').value,
    notes: document.getElementById('n-notes').value,
    checkedIds: Object.keys(checked).filter(k => checked[k]),
    allIds: all.map(i => i.id),
  };

  history.unshift(trade);
  saveHistory();
  renderHistory();
  switchTab('history');

  // feedback flash
  const btn = document.querySelector('.btn.primary');
  btn.textContent = '✓ Guardado';
  setTimeout(() => btn.textContent = 'Guardar en historial', 1500);
}

function resetAll() {
  document.getElementById('n-pair').value = '';
  document.getElementById('n-dir').value = '';
  document.getElementById('n-result').value = '';
  document.getElementById('n-entry').value = '';
  document.getElementById('n-sl').value = '';
  document.getElementById('n-tp').value = '';
  document.getElementById('n-notes').value = '';
  renderChecklist();
}

// ════════════ HISTORY ════════════
function renderHistory() {
  const list = document.getElementById('histList');
  list.innerHTML = '';

  // Stats
  const total = history.length;
  const wins = history.filter(t => t.result === 'WIN').length;
  const losses = history.filter(t => t.result === 'LOSS').length;
  const noEntradas = history.filter(t => t.verdict === 'no' && t.result && t.result !== 'No ejecutado' && t.result !== '').length;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num stat-b">${total}</div><div class="stat-label">Trades</div></div>
    <div class="stat-card"><div class="stat-num stat-g">${wins}</div><div class="stat-label">Wins</div></div>
    <div class="stat-card"><div class="stat-num stat-r">${losses}</div><div class="stat-label">Losses</div></div>
    <div class="stat-card"><div class="stat-num stat-y">${noEntradas}</div><div class="stat-label">Entradas sin checklist OK</div></div>
  `;

  if (history.length === 0) {
    list.innerHTML = '<div class="history-empty">Aún no hay trades guardados.<br>Completa el checklist y guarda tu primer trade.</div>';
    return;
  }

  history.forEach((t, idx) => {
    const allItems = getAllAllItems();
    const missedMandatory = allItems
      .filter(i => i.m && !t.checkedIds.includes(i.id))
      .slice(0, 5);

    const item = document.createElement('div');
    item.className = 'hist-item';
    item.innerHTML = `
      <div class="hist-top">
        <span class="hist-verdict ${t.verdict}">${t.verdict === 'go' ? '✅ VÁLIDO' : t.verdict === 'almost' ? '⚡ CASI' : '🚫 NO OK'}</span>
        <span class="hist-meta">${t.ts} · ${t.session.toUpperCase()} · ${t.pair}</span>
        <span class="hist-score">${t.score}</span>
        <button class="del-hist" onclick="deleteTrade(${t.id}, event)">×</button>
      </div>
      <div class="hist-fields">
        ${t.dir ? `<div class="hist-field">Dir: <span>${t.dir}</span></div>` : ''}
        ${t.entry ? `<div class="hist-field">Entrada: <span>${t.entry}</span></div>` : ''}
        ${t.sl ? `<div class="hist-field">SL: <span>${t.sl}</span></div>` : ''}
        ${t.tp ? `<div class="hist-field">TP: <span>${t.tp}</span></div>` : ''}
        ${t.result ? `<div class="hist-field">Resultado: <span style="color:${t.result==='WIN'?'var(--g)':t.result==='LOSS'?'var(--r)':'var(--y)'}">${t.result}</span></div>` : ''}
      </div>
      ${t.notes ? `<div class="hist-notes">${t.notes}</div>` : ''}
      <div class="hist-detail">
        ${missedMandatory.length > 0 ? `
          <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--r);letter-spacing:2px;margin-bottom:6px;margin-top:8px;">OBLIGATORIOS FALTANTES</div>
          <div class="hist-checks">
            ${missedMandatory.map(i => `<span class="hist-check-tag hct-miss">✗ ${i.id.toUpperCase()}</span>`).join('')}
          </div>` : ''}
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted2);margin-top:8px;cursor:pointer;" onclick="toggleHist(this.parentElement)">▾ ver detalle</div>
    `;
    list.appendChild(item);
  });
}

function getAllAllItems() {
  const all = [];
  ['bias','sweep','entry','m1','risk'].forEach(k => SECTIONS[k].items.forEach(i => all.push(i)));
  Object.values(SESSION_ITEMS).forEach(arr => arr.forEach(i => {
    if (!all.find(x => x.id === i.id)) all.push(i);
  }));
  return all;
}

function toggleHist(el) {
  el.classList.toggle('expanded');
}

function deleteTrade(id, e) {
  e.stopPropagation();
  history = history.filter(t => t.id !== id);
  saveHistory();
  renderHistory();
}

// ════════════ TABS ════════════
function switchTab(name) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
  if (name === 'history') renderHistory();
}

// ════════════ INIT ════════════
loadState();
renderChecklist();
renderHistory();
</script>
</body>
</html>
